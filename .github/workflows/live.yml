name: TRA Live Board 即時抓取

on:
  workflow_dispatch:

# 同一時間只允許一個 live 執行，避免 git push 競爭
concurrency:
  group: live-crawl
  cancel-in-progress: false

env:
  TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
  TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}

jobs:
  live:
    name: 即時看板 StationLiveBoard
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "TDX_CLIENT_ID=${{ secrets.TDX_CLIENT_ID }}" > .env
          echo "TDX_CLIENT_SECRET=${{ secrets.TDX_CLIENT_SECRET }}" >> .env

      - name: Crawl live data
        run: python main.py live

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/station_live/ -f
          git diff --cached --quiet || {
            TIMESTAMP=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')
            git commit -m "🤖 auto-crawl: ${TIMESTAMP}"
            git pull --rebase origin main
            git push
          }
